<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shelf for Mac</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6fb;
      color: #1f2430;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    main {
      width: min(720px, 100%);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 36px;
      padding: 44px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 24px 70px rgba(27, 39, 67, 0.14);
    }

    .icon {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: #e9f2ff;
      color: #087dff;
      font-size: 40px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(42px, 7vw, 74px);
      letter-spacing: -0.07em;
      line-height: 0.9;
      margin: 0 0 18px;
    }

    p {
      max-width: 570px;
      color: #677084;
      font-size: 20px;
      line-height: 1.5;
      margin: 0 0 28px;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 14px 20px;
      background: #087dff;
      color: white;
      text-decoration: none;
      font-weight: 750;
      box-shadow: 0 12px 30px rgba(8, 125, 255, 0.25);
    }

    .note {
      margin-top: 22px;
      font-size: 14px;
      color: #7b8496;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #171819;
        color: #f5f5f7;
      }

      main {
        background: rgba(45, 45, 45, 0.78);
        border-color: rgba(255, 255, 255, 0.08);
      }

      p, .note {
        color: #a2a8b4;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="icon">▱</div>
    <h1>Shelf for Mac</h1>
    <p>A tiny native Mac app for saving links, files, and notes for later. Drop anything in, open it when you need it, and keep your desktop calmer.</p>
    <a class="button" href="https://github.com/YOUR_GITHUB_USERNAME/Shelf/releases/latest">Download Shelf</a>
    <div class="note">Free for macOS 14 or newer. If macOS says the developer cannot be verified, right-click Shelf and choose Open.</div>
  </main>
</body>
</html>
